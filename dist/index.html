      * {

          min-height: 100vh;

          flex-direction: column;
          align-items: center;

      /* 卡片容器：控制最大宽度，垂直间距 */
      .cards-container {
          max-width: 1200px;
          width: 100%;
          display: flex;
          flex-direction: column;
          gap: 1.8rem;
      }

      /* 通用卡片样式 */
      .card {

          backdrop-filter: blur(10px);
          -webkit-backdrop-filter: blur(10px);
          border-radius: 40px;
          box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.2);
          padding: 2rem 2.2rem;
          border: 1px solid rgba(255, 255, 255, 0.5);
          transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .card:hover {
          transform: translateY(-2px);
          box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      }

      /* 文章卡片（独立） */
      .article-card {
          /* 直接使用 .card 样式，无需额外 */
      }

      .article-card article {
          /* 移除内联 margin-top，由卡片内边距控制 */
          color: #2f405c;
      }

      .article-card h2 {
          font-size: 1.5rem;
          font-weight: 600;
          color: #1e2b3c;
          margin-bottom: 1rem;
          border-left: 6px solid #3b8cff;
          padding-left: 1rem;
      }

          margin: 0.75rem 0;
          font-size: 1.05rem;
          line-height: 1.5;
          color: #2f405c;
      }

      .article-card p:last-child {
          margin-bottom: 0;
      }

      /* 全局页脚 */
      .global-footer {
          margin-top: 2rem;
          font-size: 0.9rem;
          color: #8a9bb5;
          text-align: center;
          max-width: 1200px;
          width: 100%;
      }

             /* 关注按钮卡片 */
      .link-card {
          display: flex;
          justify-content: center;
          align-items: center;
          padding: 1.5rem;  /* 调整内边距，让按钮更突出 */
      }
      .follow-button {
          display: inline-block;
          background: linear-gradient(135deg, #fb7299, #ff8fab);
          color: white;
          font-size: 1.5rem;
          font-weight: 600;

          border-radius: 60px;

          backdrop-filter: blur(4px);

      .follow-button:hover {
          transform: scale(1.05);
          box-shadow: 0 15px 30px -5px rgba(251, 114, 153, 0.6);
